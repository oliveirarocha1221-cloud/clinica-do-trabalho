<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Área da clinica</title>

<style>

body{
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#0c4a6e,#2563eb);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
width:350px;
}

h2{
color:#0c4a6e;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:6px;
background:#0c4a6e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#08364f;
}

.erro{
color:red;
display:none;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login">

<h2>Área da Clinica</h2>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="entrar()">Entrar</button>

<button onclick="window.location.href='index.html'">
Voltar
</button>

<p class="erro" id="erro">Senha incorreta</p>

</div>

<script>

function entrar(){

let senha = document.getElementById("senha").value

if(senha === "clinica123"){

window.location.href = "empresas.html"

}else{

document.getElementById("erro").style.display = "block"

}

}

</script>
