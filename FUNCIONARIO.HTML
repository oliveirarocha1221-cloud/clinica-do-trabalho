<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Área do Funcionário</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0c4a6e,#2563eb);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
width:450px;
}

.logo{
width:160px;
margin-bottom:20px;
}

h1{
color:#0c4a6e;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#0c4a6e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#08364f;
}

</style>

</head>

<body>

<div class="container">

<img src="Logo assinatura (5).png" class="logo">

<h1>Área do Funcionário</h1>

<button onclick="window.location.href='questionario.html'">
Responder formulário
</button>

<button onclick="window.location.href='index.html'">
Voltar
</button>

</div>

</body>
</html>
