<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clínica do Trabalho</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0c4a6e,#2563eb);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
width:450px;
}

.logo{
width:160px;
margin-bottom:20px;
}

h1{
color:#0c4a6e;
margin-bottom:10px;
}

.frase{
color:#444;
margin-bottom:30px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0c4a6e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#08364f;
}

</style>

</head>

<body>

<div class="container">

<img src="Logo assinatura (5).png" class="logo">

<h1>Avaliação Psicossocial</h1>

<p class="frase">
Este questionário tem como objetivo avaliar aspectos psicossociais relacionados ao ambiente de trabalho,
contribuindo para a promoção da saúde, segurança e bem-estar dos colaboradores.
</p>

<button onclick="window.location.href='funcionario.html'">

</button>

</button>
