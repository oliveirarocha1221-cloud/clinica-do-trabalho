<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Empresas Respondentes</title>

<style>

body{
font-family:Arial;
background:#f0f4f8;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
text-align:center;
color:#0c4a6e;
}

.empresa{
display:block;
background:white;
padding:15px;
margin:10px 0;
border-radius:6px;
text-decoration:none;
color:#333;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.voltar{
display:inline-block;
margin-bottom:20px;
background:#0c4a6e;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="voltar">Voltar</a>

<h1>Empresas que responderam</h1>

<div id="listaEmpresas"></div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("respostas")) || [];

let empresas = new Set();

dados.forEach(item=>{
empresas.add(item.empresa);
});

let lista = document.getElementById("listaEmpresas");

empresas.forEach(emp=>{

let link = document.createElement("a");

link.className="empresa";

link.innerText = emp;

link.href = "painel.html?empresa=" + encodeURIComponent(emp);

lista.appendChild(link);

});

</script>

</body>
</html>
